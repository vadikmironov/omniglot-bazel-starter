name: Omniglot Bazel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel stale runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI policy
# ---------
# Every pull request and push to main runs the full gate: build + test across the
# hermetic Clang and hermetic GCC toolchains on Linux and hermetic Clang on macOS,
# plus the lint phase (clang-tidy, GCC -fanalyzer, PMD/SpotBugs/ruff/mypy, and the
# gazelle/publish/mint drift gates). Windows is currently disabled — see build-windows.

jobs:
  # Linux/Clang leg: build + test. Independent of the lint job (no `needs:`) so
  # build/test feedback isn't gated on lint.
  build-linux-clang:
    runs-on: ubuntu-latest
    name: Build & test (Linux x64, hermetic Clang)
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_linux
    - uses: ./.github/actions/bazel_test
      with:
        buildbuddy_api_key: ${{ secrets.BUILDBUDDY_API_KEY }}

  # Linux build + test under the hermetic GCC toolchain (compiler-portability leg).
  build-linux-gcc:
    runs-on: ubuntu-latest
    name: Build & test (Linux x64, hermetic GCC)
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_linux
    - name: Build and test with hermetic GCC
      uses: ./.github/actions/bazel_test
      with:
        bazel_config: gcc_hermetic
        buildbuddy_api_key: ${{ secrets.BUILDBUDDY_API_KEY }}

  # macOS build + test (default hermetic Clang). There is no macOS/GCC leg — the
  # hermetic GCC toolchain (f0rmiga/gcc-toolchain) is Linux-only.
  # Note: macOS x64 (Intel) is not supported because the pinned LLVM has no Intel
  # macOS distribution. See:
  # https://github.com/bazel-contrib/toolchains_llvm/blob/master/toolchain/internal/llvm_distributions.bzl
  build-macos:
    runs-on: macos-latest
    name: Build & test (macOS ARM64, hermetic Clang)
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_macos
    - uses: ./.github/actions/bazel_test
      with:
        buildbuddy_api_key: ${{ secrets.BUILDBUDDY_API_KEY }}

  # The lint phase: formatting, the linter aspects (clang-tidy / clippy / PMD /
  # SpotBugs / ruff / mypy), GCC -fanalyzer static analysis, and the gazelle /
  # publish / mint drift gates.
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_linux
    - name: Configure remote cache
      env:
        BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        if [ -n "$BUILDBUDDY_API_KEY" ]; then
          echo "build:remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" > user.bazelrc
          echo "build --config=remote-cache" >> user.bazelrc
          echo "Remote cache enabled for lint"
        fi
    - name: Run buildifier check
      run: bazel run //:buildifier.check
    - name: Run formatter check
      run: bazel run //tools/format:format.check
    - name: Run linter check
      run: bazel test --test_tag_filters=lint //...
    - name: GCC static analysis (-fanalyzer, the clang-tidy analog)
      # GCC's built-in analyzer over first-party C++ only (the gcc_analyzer config
      # scopes -fanalyzer to modules/ sources); -Werror promotes findings to errors.
      # Excludes the cpp_py_* modules, whose Python.h surface mirrors the .clang-tidy
      # carve-outs. Remote cache is inherited from the user.bazelrc written above.
      run: |
        bazel build --config=gcc_analyzer \
          //modules/cpp_app //modules/cpp_app_with_ext_dep //modules/cpp_library
    - name: Check lint targets up-to-date
      # Scope the diff to BUILD files only — the lint job's bazel invocations
      # can legitimately rewrite MODULE.bazel.lock due to crate_universe's
      # transitive-digest nondeterminism, which we don't want to misattribute
      # to gazelle.
      run: |
        bazel run //:lint_gen
        if ! git diff --exit-code -- '**/BUILD' '**/BUILD.bazel'; then
          echo "ERROR: lint_test targets are out of date. Run: bazel run //:lint_gen" >&2
          exit 1
        fi
    - name: Check publish targets up-to-date
      run: |
        bazel run //:publish_gen -- -publish_strict
        if ! git diff --exit-code -- '**/BUILD' '**/BUILD.bazel'; then
          echo "ERROR: :publish targets are out of date. Run: bazel run //:publish_gen" >&2
          exit 1
        fi
    - name: Mint dry-run smoke test
      # Exercises the mint engine end-to-end (scope resolution, version
      # planning, :publish_image discovery via bazel query) without
      # touching any registry. Catches engine regressions the gazelle
      # drift gate above can't see.
      run: bazel run //tools/publish:mint -- --mode dev --include-pub-targets all --dry-run

  # Code coverage: builds the merged LCOV across all languages, renders it to HTML
  # with the hermetic lcov genhtml, uploads it as a workflow artifact, and posts
  # the overall line coverage on pull requests — with a delta against the latest
  # main baseline (published to Pages as coverage.json). The report itself is
  # published to GitHub Pages by the deploy-coverage-pages job (main only).
  # Report-only — it does not gate the build on a coverage threshold.
  coverage:
    runs-on: ubuntu-latest
    name: Coverage (Linux x64)
    permissions:
      contents: read
      pull-requests: write # post the PR coverage comment

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_linux
    - name: Configure remote cache
      env:
        BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        if [ -n "$BUILDBUDDY_API_KEY" ]; then
          echo "build:remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" > user.bazelrc
          echo "build --config=remote-cache" >> user.bazelrc
          echo "Remote cache enabled for coverage"
        fi
    - name: Collect coverage
      # Inherits `test --test_tag_filters=-lint` from .bazelrc (coverage extends
      # the test command), so lint_test rules are excluded. Uses remote-cache
      # rather than --config=ci so outputs stay downloaded and the combined
      # report is available to render.
      run: bazel coverage --combined_report=lcov //...
    - name: Compute coverage summary
      id: cov
      run: |
        report=bazel-out/_coverage/_coverage_report.dat
        pct=$(awk -F: '/^LH:/{h+=$2} /^LF:/{f+=$2} END{if (f > 0) printf "%.1f", 100*h/f; else print "0.0"}' "$report")
        echo "pct=$pct" >> "$GITHUB_OUTPUT"
        echo "Overall line coverage: ${pct}%"
    - name: Render HTML report
      run: bazel run //tools/coverage:report
    - name: Publish coverage baseline for delta
      # Emits the overall % as JSON next to the HTML so it deploys to Pages at
      # <pages-url>/coverage.json. Pull requests fetch it to show a delta vs main.
      if: github.ref == 'refs/heads/main'
      run: |
        printf '{"pct": "%s"}\n' "${{ steps.cov.outputs.pct }}" > coverage-html/coverage.json
    - name: Upload coverage HTML artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-html
        path: coverage-html/
    - name: Upload Pages artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v5
      with:
        path: coverage-html/
    - name: Fetch main coverage baseline
      # Reads the % published to Pages by the last main run. Absent (first run,
      # Pages down) → empty output and the comment falls back to absolute only.
      id: baseline
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      run: |
        url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/coverage.json"
        pct=$(curl -fsSL "$url" | jq -r '.pct // empty' 2>/dev/null || true)
        echo "pct=${pct}" >> "$GITHUB_OUTPUT"
        echo "main baseline: ${pct:-<none>}"
    - name: Post coverage summary on PR
      # Same-repo PRs only — fork PRs lack a write token.
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@v9
      env:
        COV_PCT: ${{ steps.cov.outputs.pct }}
        BASE_PCT: ${{ steps.baseline.outputs.pct }}
      with:
        script: |
          const marker = '<!-- coverage-report -->';
          const cur = parseFloat(process.env.COV_PCT);
          const base = process.env.BASE_PCT ? parseFloat(process.env.BASE_PCT) : NaN;
          let delta;
          if (!Number.isNaN(base)) {
            const d = cur - base;
            const emoji = d > 0.05 ? '🔼' : d < -0.05 ? '🔽' : '➖';
            const sign = d > 0 ? '+' : '';
            delta = `Change vs \`main\`: ${emoji} **${sign}${d.toFixed(1)} pp** _(main: ${base.toFixed(1)}%)_`;
          } else {
            delta = `_No coverage baseline on \`main\` yet; the delta appears once \`main\` publishes a report._`;
          }
          const body = `${marker}\n### 📊 Coverage\n\n`
            + `Overall line coverage: **${cur.toFixed(1)}%**\n\n`
            + `${delta}\n\n`
            + `<sub>Full HTML report is attached as the \`coverage-html\` workflow artifact; `
            + `the latest report publishes to GitHub Pages on merge to \`main\`.</sub>`;
          const {owner, repo} = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {owner, repo, issue_number});
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
          } else {
            await github.rest.issues.createComment({owner, repo, issue_number, body});
          }

  # Publishes the latest coverage HTML to GitHub Pages (main only). Split from the
  # coverage job because Pages deployment needs its own environment. Prerequisite:
  # in repo Settings -> Pages, set the source to "GitHub Actions".
  deploy-coverage-pages:
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    name: Deploy coverage to Pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

  # Windows build - currently disabled. Remove the `if: false` below to re-enable
  # (it will then run on every PR and push like the other jobs).
  build-windows:
    if: false
    runs-on: windows-latest
    name: Build & test (Windows x64)
    permissions:
      contents: read

    env:
      # Use shorter output_base to avoid Windows MAX_PATH (260 char) limit
      # See: https://github.com/bazelbuild/rules_rust/issues/1946
      BAZEL_STARTUP_OPTS: "--output_base=C:/bazel_build"

    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup_windows
      with:
        bazel_startup_opts: ${{ env.BAZEL_STARTUP_OPTS }}
    - uses: ./.github/actions/bazel_test
      with:
        buildbuddy_api_key: ${{ secrets.BUILDBUDDY_API_KEY }}
        bazel_startup_opts: ${{ env.BAZEL_STARTUP_OPTS }}
